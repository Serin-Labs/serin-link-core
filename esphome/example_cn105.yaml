# Serin Link + echavet/MitsubishiCN105ESPHome on one ESP32.
#
# VERIFIED ON HARDWARE 2026-07-10 (M5Stack AtomS3 Lite, ESPHome 2026.6.5,
# IDF 5.5): the dial pairs, pulls CAPS (zone name comes from the climate
# entity), streams STATE, and its mode/setpoint/fan commands route into the
# cn105 climate entity via ClimateCall.
#
# Adding serin_link to an existing echavet config is three edits:
#   1. framework: type: esp-idf        (required)
#   2. add the serin_link external_component
#   3. give the climate entity an `id:` and add the `serin_link:` block
# Do NOT add an `espnow:` block — serin_link owns the radio and config
# validation rejects it.

esphome:
  name: serin-cn105
  friendly_name: Living Room

esp32:
  board: m5stack-atoms3
  framework:
    type: esp-idf   # required: raw nvs_*, esp_now encrypted peers, libsodium

external_components:
  - source: github://echavet/MitsubishiCN105ESPHome
  - source:
      type: local
      path: ../esphome/components
      # no published tag has the telemetry keys below yet (v0.1.2 predates
      # them); TODO(release): once one ships, point this at
      # github://Serin-Labs/serin-link-core@vX.Y.Z instead.
    components: [serin_link]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # serin_link forces power-save off at runtime anyway (ESP-NOW RX needs the
  # radio awake), but setting it here keeps the intent visible.
  power_save_mode: NONE

logger:
api:
ota:
  - platform: esphome

uart:
  id: HP_UART
  baud_rate: 2400
  parity: EVEN
  rx_pin: GPIO2      # AtomS3 Lite grove; use GPIO16/17 on a plain ESP32
  tx_pin: GPIO1

climate:
  - platform: cn105
    id: hvac         # <- serin_link binds this
    name: "Living Room"
    update_interval: 2s
    # Vanes: cn105 exposes them as select entities; give them ids and bind
    # them below so the dial gets both axes (option order = wire positions,
    # "auto"/"swing" options map to the wire AUTO/SWING codes).
    vertical_vane_select:
      name: "Vertical Vane"
      id: vane_v
    horizontal_vane_select:
      name: "Horizontal Vane"
      id: vane_h
    # Telemetry the dial can show (INFO TLVs) — give the platform's sensor
    # blocks ids and bind them in serin_link: below.
    outside_air_temperature_sensor:
      name: "Outside Air Temp"
      id: oat
    compressor_frequency_sensor:
      name: "Compressor Frequency"
      id: comp_hz
      entity_category: diagnostic
    stage_sensor:
      name: "Stage"
      id: stage
      entity_category: diagnostic
    sub_mode_sensor:
      name: "Sub Mode"
      id: sub_mode
      entity_category: diagnostic
    auto_sub_mode_sensor:
      name: "Auto Sub Mode"
      id: auto_sub
      entity_category: diagnostic
    input_power_sensor:
      name: "Input Power"
      id: input_w
      entity_category: diagnostic
    kwh_sensor:
      name: "Energy Used"
      id: kwh_total
      entity_category: diagnostic
    runtime_hours_sensor:
      name: "Runtime Hours"
      id: runtime_h
      entity_category: diagnostic

serin_link:
  id: serin          # NB: `id: link` collides with libc link() in generated code
  climate_id: hvac
  # zone_name: "Living Room"   # defaults to the climate entity's name
  # Device-link health -> the dial's offline face + System "No link". Without
  # this, a dead CN105 UART is invisible: the climate entity keeps existing,
  # so the dial would show "Connected" with a frozen (or 0°) temperature.
  # Omit the line entirely on platforms with no such signal — the fallback
  # heuristic (room temperature NaN = never heard from the device) still
  # catches the never-connected case.
  hvac_link: !lambda 'return id(hvac).isHeatpumpConnected();'
  vane_v_select: vane_v
  vane_h_select: vane_h
  # Telemetry -> the dial's INFO pages (outside temp, compressor, energy,
  # runtime). Bind any sensors you like — these are the cn105 ones above.
  # A battery_sensor (any % sensor, e.g. a BLE room sensor imported from HA)
  # additionally drives the dial's low-battery chip.
  outside_temp_sensor: oat
  compressor_hz_sensor: comp_hz
  stage_sensor: stage
  sub_mode_sensor: sub_mode
  auto_sub_mode_sensor: auto_sub
  runtime_sensor: runtime_h
  power_sensor: input_w
  energy_sensor: kwh_total

button:
  - platform: template
    name: "Pair Serin Dial"
    on_press:
      - lambda: 'id(serin).pair_start(60000);'
  - platform: template
    name: "Forget All Dials"
    on_press:
      - lambda: 'id(serin).forget_all_dials();'

binary_sensor:
  - platform: template
    name: "Serin Dial Linked"
    lambda: 'return id(serin).any_dial_live();'

# Known gaps against a native Serin Controller:
#  - Link OTA credential relay: not wired (dial hides its update entry).
