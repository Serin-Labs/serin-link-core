# FIELD-SHAPED CN105 BENCH: a realistic end-user config — the serin-labs.com
# generator output plus the tweaks people actually make (remote HA temp sensor,
# restart button, diagnostics enabled) — with serin_link added the three-edit
# way (see example_cn105.yaml). Runs on the bench board with no heat pump
# attached: the cn105 UART talks to nothing, so the climate entity stays empty
# and the dial shows its "No link" face via hvac_link — that behavior is part
# of what this bench exercises.
#
# Differences from a stock field config, on purpose:
#   - framework esp-idf, not arduino: serin_link requires it (raw nvs_*,
#     esp_now encrypted peers, libsodium).
#   - external component from the local tree, not github://Serin-Labs/…,
#     so the bench always runs the latest core.
substitutions:
  name: heatpump-bench
  friendly_name: "Heat Pump - Bench"
  remote_temp_sensor: sensor.your_room_temperature  # any HA temperature sensor

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # serin_link forces power-save off at runtime anyway (ESP-NOW RX needs the
  # radio awake), but setting it here keeps the intent visible.
  power_save_mode: NONE
  ap:
    ssid: "Serin Setup"
    password: "serinsetup"

api:
  encryption:
    key: !secret api_encryption_key

captive_portal:
improv_serial:

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: serin-esp32s3.cn105
    version: '0.1'

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  framework:
    type: esp-idf   # required by serin_link (field configs on arduino must switch)

uart:
  id: HP_UART
  baud_rate: 2400
  parity: EVEN
  tx_pin: GPIO1
  rx_pin: GPIO2

external_components:
  - source: github://echavet/MitsubishiCN105ESPHome
  - source:
      type: local
      path: ../esphome/components
    components: [serin_link]

sensor:
  - platform: uptime
    name: Uptime
    disabled_by_default: false
    force_update: false
    unit_of_measurement: s
    icon: mdi:timer-outline
    accuracy_decimals: 0
    device_class: duration
    state_class: total_increasing
    update_interval: 60s
    internal: false
  - platform: wifi_signal
    name: Signal dB
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic
  - platform: homeassistant
    name: Remote Temperature Sensor
    entity_id: ${remote_temp_sensor}
    internal: false
    device_class: temperature
    state_class: measurement
    unit_of_measurement: °C
    filters:
      - lambda: return (x - 32) * (5.0/9.0);
      - clamp:
          min_value: 1
          max_value: 40
          ignore_out_of_range: true
      - throttle: 30s
      - heartbeat: 15s
    on_value:
      then:
        - logger.log:
            level: INFO
            format: 'Remote temperature received from HA: %.1f C'
            args:
              - x
        - lambda: id(hp).set_remote_temperature(x);

button:
  - platform: restart
    icon: mdi:power-cycle
    name: ESP Reboot
  - platform: template
    name: "Pair Serin Dial"
    on_press:
      - lambda: 'id(serin).pair_start(60000);'
  - platform: template
    name: "Forget All Dials"
    on_press:
      - lambda: 'id(serin).forget_all_dials();'

binary_sensor:
  - platform: gpio
    name: Button
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      then:
        - logger.log: Button Pressed
  - platform: template
    name: "Serin Dial Linked"
    lambda: 'return id(serin).any_dial_live();'

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: 35
    num_leds: 4
    chipset: ws2812
    id: led
    name: Led

climate:
  - platform: cn105
    id: hp             # <- serin_link binds this
    name: ${friendly_name}
    icon: mdi:heat-pump
    visual:
      min_temperature: 15
      max_temperature: 31
      temperature_step:
        target_temperature: 0.5
        current_temperature: 0.1
    remote_temperature_timeout: 30min
    update_interval: 2s
    debounce_delay: 100ms
    vertical_vane_select:
      icon: mdi:swap-vertical
      name: Vertical Vane
      id: vane_v       # <- bound below so the dial gets the axis
    supports:
      mode:
        - COOL
        - HEAT
        - FAN_ONLY
        - DRY
      fan_mode:
        - AUTO
        - QUIET
        - LOW
        - MEDIUM
        - HIGH
    outside_air_temperature_sensor:
      name: Outside Air Temp
    stage_sensor:
      name: Stage
      entity_category: diagnostic
    sub_mode_sensor:
      name: Sub Mode
      entity_category: diagnostic
    auto_sub_mode_sensor:
      name: Auto Sub Mode
      entity_category: diagnostic

serin_link:
  id: serin            # NB: `id: link` collides with libc link() in generated code
  climate_id: hp
  # Device-link health -> the dial's offline face + System "No link". On this
  # bench nothing is on the UART, so the dial correctly shows "No link".
  hvac_link: !lambda 'return id(hp).isHeatpumpConnected();'
  vane_v_select: vane_v

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP
    ssid:
      name: SSID
  - platform: version
    name: ESPHome Version
    hide_timestamp: true
    disabled_by_default: false
    icon: mdi:new-box
    entity_category: diagnostic

web_server:
  version: 3

logger:
  level: INFO

ota:
  - platform: esphome
