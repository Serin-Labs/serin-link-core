# Serin Link on a GENERIC ESPHome climate device.
#
# The dial pairs with this node and controls whatever `climate_id` points at —
# any ESPHome climate platform (thermostat, midea, daikin, gree, ...). CAPS
# derive from the entity's traits: the dial's mode ring shows only the modes
# this entity supports, the setpoint clamps to its visual range, fan detents
# follow its discrete fan modes.

esphome:
  name: serin-zone
  friendly_name: Guest Room

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf   # required: raw nvs_*, esp_now encrypted peers, libsodium

external_components:
  - source: github://Serin-Labs/serin-link-core@v0.1.1   # or type: local / path: ...
    components: [serin_link]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
api:
ota:
  - platform: esphome

# Any climate platform works. `thermostat` shown as the generic example:
sensor:
  - platform: homeassistant
    id: room_temp
    entity_id: sensor.guest_room_temperature

climate:
  - platform: thermostat
    id: hvac
    name: "Guest Room"
    sensor: room_temp
    min_heating_off_time: 300s
    min_heating_run_time: 300s
    min_idle_time: 30s
    heat_action:
      - switch.turn_on: heater
    idle_action:
      - switch.turn_off: heater
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 20 °C

switch:
  - platform: gpio
    id: heater
    pin: GPIO5

serin_link:
  id: serin
  climate_id: hvac
  # zone_name: "Guest Room"   # defaults to the entity/friendly name
  # hvac_link: !lambda '...'  # bind your platform's device-link health if it
  #                           # has one (see example_cn105.yaml); unset, a NaN
  #                           # room temp on an entity that claims one reports
  #                           # the link down (never-heard-from-device)

button:
  - platform: template
    name: "Pair Serin Dial"
    on_press:
      - lambda: 'id(serin).pair_start(60000);'
  - platform: template
    name: "Forget All Dials"
    on_press:
      - lambda: 'id(serin).forget_all_dials();'

binary_sensor:
  - platform: template
    name: "Serin Dial Linked"
    lambda: 'return id(serin).any_dial_live();'
