name: CI
on:
  push:
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run host test suite
        run: test/run.sh

  vendored-copies-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Re-vendor and diff
        run: |
          tools/sync_esphome.sh
          git diff --exit-code -- esphome/components/serin_link

  esphome-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ESPHome
        run: pip install esphome==2026.6.5
      - name: CI secrets stub
        run: |
          printf 'wifi_ssid: "ci"\nwifi_password: "ci-password-123"\napi_encryption_key: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="\n' > esphome/secrets.yaml
      - name: Compile component (local path, spike config)
        run: esphome compile esphome/example_spike.yaml
